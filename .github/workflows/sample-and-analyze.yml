name: YouBike sample & analyze

on:
  schedule:
    # 每 15 分鐘一次（UTC 時間；台灣 = UTC+8）
    - cron: '*/15 * * * *'
  workflow_dispatch:   # 也可以手動觸發

permissions:
  contents: write

concurrency:
  # 同一時間只跑一個實例，避免推送衝突
  group: youbike-history
  cancel-in-progress: false

jobs:
  sample-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests openpyxl

      - name: Sample YouBike data
        run: python sample.py

      - name: Analyze history
        run: python analyze.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/ stale.json stale.xlsx
          git diff --staged --quiet || git commit -m "Sample & analyze $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
